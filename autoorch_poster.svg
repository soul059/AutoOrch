  <path d="M 1070 373 C 1160 430, 1290 430, 1380 373" fill="none" stroke="#56e0c4" stroke-opacity="0.5" stroke-width="3" stroke-dasharray="8 10"/>
  <text x="1225" y="410" text-anchor="middle" fill="#a7f3d0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Safety, observability, recovery, and cost awareness by design</text>
</svg>