<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AutoOrch Control Plane Poster</title>
  <desc id="desc">Promotional poster for AutoOrch, a self-hosted prompt-to-company orchestration platform with multi-agent routing, shared state, guardrails, and human approvals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0d1830"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13213f" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0b1327" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#56e0c4"/>
      <stop offset="50%" stop-color="#57b4ff"/>
      <stop offset="100%" stop-color="#f8b84e"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#93c5fd" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <circle cx="1330" cy="110" r="180" fill="#38bdf8" opacity="0.14" filter="url(#softGlow)"/>
  <circle cx="1220" cy="220" r="120" fill="#34d399" opacity="0.10" filter="url(#softGlow)"/>
  <circle cx="230" cy="760" r="220" fill="#f97316" opacity="0.08" filter="url(#softGlow)"/>

  <rect x="70" y="62" width="1460" height="850" rx="34" fill="#081121" fill-opacity="0.34" stroke="#7dd3fc" stroke-opacity="0.18"/>

  <text x="110" y="122" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3">HACKATHON POSTER</text>
  <text x="110" y="208" fill="#f8fafc" font-family="Georgia, Times New Roman, serif" font-size="70" font-weight="700">AutoOrch</text>
  <text x="110" y="270" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600">Control Plane for Prompt-to-Company Orchestration</text>
  <rect x="110" y="296" width="520" height="8" rx="4" fill="url(#accent)"/>
  <text x="110" y="358" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="28">One business prompt becomes a governed, multi-agent execution workflow</text>
  <text x="110" y="398" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="28">with shared state, strict routing, budget control, and human approvals.</text>

  <g filter="url(#shadow)">
    <rect x="1060" y="98" width="430" height="250" rx="28" fill="url(#panel)" stroke="#67e8f9" stroke-opacity="0.28"/>
  </g>
  <text x="1082" y="148" fill="#a5f3fc" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">CORE PROMISE</text>
  <text x="1082" y="204" fill="#f8fafc" font-family="Georgia, Times New Roman, serif" font-size="40" font-weight="700">Prompt in.</text>
  <text x="1082" y="252" fill="#f8fafc" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="700">Governed execution out.</text>
  <text x="1082" y="302" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="14">Built for safe autonomy in a self-hosted environment.</text>

  <g filter="url(#shadow)">
    <rect x="110" y="460" width="438" height="258" rx="28" fill="url(#panel)" stroke="#60a5fa" stroke-opacity="0.25"/>
    <rect x="585" y="460" width="430" height="258" rx="28" fill="url(#panel)" stroke="#34d399" stroke-opacity="0.25"/>
    <rect x="1060" y="460" width="435" height="258" rx="28" fill="url(#panel)" stroke="#fb7185" stroke-opacity="0.25"/>
  </g>

  <text x="125" y="500" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2">WHY IT MATTERS</text>
  <text x="125" y="540" fill="#f8fafc" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700">From AI demo to operating system</text>
  <text x="125" y="580" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="18">Traditional agent demos free-run and drift.</text>
  <text x="125" y="605" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="18">AutoOrch keeps every role on the same blackboard,</text>
  <text x="125" y="630" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="18">requires deterministic JSON outputs, and stops risky</text>
  <text x="125" y="655" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="18">actions until a human approves the next move.</text>

  <text x="620" y="512" fill="#86efac" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">KEY CAPABILITIES</text>
  <rect x="620" y="542" width="160" height="40" rx="20" fill="#10233e" stroke="#57b4ff" stroke-opacity="0.45"/>
  <rect x="790" y="542" width="180" height="40" rx="20" fill="#10233e" stroke="#57b4ff" stroke-opacity="0.45"/>
  <rect x="620" y="594" width="150" height="40" rx="20" fill="#10233e" stroke="#34d399" stroke-opacity="0.45"/>
  <rect x="780" y="594" width="200" height="40" rx="20" fill="#10233e" stroke="#34d399" stroke-opacity="0.45"/>
  <rect x="620" y="646" width="170" height="40" rx="20" fill="#10233e" stroke="#f59e0b" stroke-opacity="0.45"/>
  <rect x="800" y="646" width="170" height="40" rx="20" fill="#10233e" stroke="#f59e0b" stroke-opacity="0.45"/>
  <text x="700" y="568" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Multi-agent routing</text>
  <text x="880" y="568" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Shared blackboard state</text>
  <text x="695" y="620" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Strict JSON outputs</text>
  <text x="880" y="620" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Sandboxed MCP tool execution</text>
  <text x="705" y="672" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Budget guardrails</text>
  <text x="885" y="672" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Human approval gates</text>

  <text x="1095" y="512" fill="#fda4af" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">EXECUTION LOOP</text>
  <circle cx="1126" cy="565" r="19" fill="#0f172a" stroke="#57b4ff" stroke-width="2"/>
  <circle cx="1126" cy="621" r="19" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <circle cx="1126" cy="677" r="19" fill="#0f172a" stroke="#f97316" stroke-width="2"/>
  <text x="1126" y="571" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">1</text>
  <text x="1126" y="627" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">2</text>
  <text x="1126" y="683" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">3</text>
  <text x="1160" y="571" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Plan the company workflow</text>
  <text x="1160" y="627" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Route work across specialist agents</text>
  <text x="1160" y="683" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Pause for approval before risky actions</text>

  <g filter="url(#shadow)">
    <rect x="110" y="748" width="1330" height="120" rx="28" fill="#091223" stroke="#94a3b8" stroke-opacity="0.18"/>
  </g>
  <text x="145" y="790" fill="#f8fafc" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="700">Architecture Snapshot</text>

  <rect x="145" y="812" width="170" height="34" rx="17" fill="#0f172a" stroke="#57b4ff" stroke-opacity="0.45"/>
  <rect x="342" y="812" width="210" height="34" rx="17" fill="#0f172a" stroke="#57b4ff" stroke-opacity="0.45"/>
  <rect x="579" y="812" width="180" height="34" rx="17" fill="#0f172a" stroke="#34d399" stroke-opacity="0.45"/>
  <rect x="786" y="812" width="200" height="34" rx="17" fill="#0f172a" stroke="#34d399" stroke-opacity="0.45"/>
  <rect x="1013" y="812" width="200" height="34" rx="17" fill="#0f172a" stroke="#f59e0b" stroke-opacity="0.45"/>
  <rect x="1240" y="812" width="165" height="34" rx="17" fill="#0f172a" stroke="#fb7185" stroke-opacity="0.45"/>

  <text x="230" y="835" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">React CEO Terminal</text>
  <text x="447" y="835" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Node.js Orchestrator</text>
  <text x="669" y="835" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Hybrid Models</text>
  <text x="886" y="835" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">MCP Sandbox Layer</text>
  <text x="1113" y="835" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">PostgreSQL Audit State</text>
  <text x="1322" y="835" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Docker Compose</text>

  <path d="M 315 829 L 338 829" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 552 829 L 575 829" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 759 829 L 782 829" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 986 829 L 1009 829" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 1213 829 L 1236 829" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <text x="145" y="862" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Planner, researcher, builder, reviewer, and operations agents work through one governed control plane.</text>

